        async _runMergedPdfWorker(pairs, quality, onProgress) {
            return new Promise(async (resolve, reject) => {
                const pairsData =[];
                for (let i = 0; i < pairs.length; i++) {
                    const pair = pairs[i];
                    if (pair.length === 1) {
                        pairsData.push([ { file: await pair[0].handle.getFile() } ]);
                    } else {
                        pairsData.push([
                            { file: await pair[0].handle.getFile() },
                            { file: await pair[1].handle.getFile() }
                        ]);
                    }
                }

                const workerCode = `
                    ${PDFDocument.toString()}
                    self.onmessage = async function(e) {
                        const { pairs, quality } = e.data;
                        try {
                            const pdf = new PDFDocument();
                            for (let i = 0; i < pairs.length; i++) {
                                const pair = pairs[i];
                                let canvas, width, height;
                                
                                if (pair.length === 1) {
                                    const bitmap = await createImageBitmap(pair[0].file);
                                    const scale = quality / 100;
                                    width = Math.max(1, Math.floor(bitmap.width * scale));
                                    height = Math.max(1, Math.floor(bitmap.height * scale));
                                    canvas = new OffscreenCanvas(width, height);
                                    const ctx = canvas.getContext('2d');
                                    ctx.fillStyle = '#ffffff';
                                    ctx.fillRect(0, 0, width, height);
                                    ctx.imageSmoothingEnabled = true;
                                    ctx.imageSmoothingQuality = 'high';
                                    ctx.drawImage(bitmap, 0, 0, width, height);
                                    bitmap.close();
                                } else {
                                    const bmpL = await createImageBitmap(pair[0].file);
                                    const bmpR = await createImageBitmap(pair[1].file);
                                    
                                    const origHeight = Math.max(bmpL.height, bmpR.height);
                                    const scaleL = origHeight / bmpL.height;
                                    const scaleR = origHeight / bmpR.height;
                                    const origWidthL = Math.round(bmpL.width * scaleL);
                                    const origWidthR = Math.round(bmpR.width * scaleR);
                                    const origWidth = origWidthL + origWidthR;
                                    
                                    const scale = quality / 100;
                                    width = Math.max(1, Math.floor(origWidth * scale));
                                    height = Math.max(1, Math.floor(origHeight * scale));
                                    
                                    const drawWL = Math.max(1, Math.floor(origWidthL * scale));
                                    const drawWR = width - drawWL;
                                    
                                    canvas = new OffscreenCanvas(width, height);
                                    const ctx = canvas.getContext('2d');
                                    ctx.fillStyle = '#ffffff';
                                    ctx.fillRect(0, 0, width, height);
                                    ctx.imageSmoothingEnabled = true;
                                    ctx.imageSmoothingQuality = 'high';
                                    ctx.drawImage(bmpL, 0, 0, drawWL, height);
                                    ctx.drawImage(bmpR, drawWL, 0, drawWR, height);
                                    
                                    bmpL.close();
                                    bmpR.close();
                                }

                                const blob = await canvas.convertToBlob({ type: 'image/jpeg', quality: 0.8 });
                                await pdf.addImagePage(blob, width, height);
                                
                                self.postMessage({ type: 'progress', current: i + 1, total: pairs.length, info: 'ページ ' + (i + 1) });
                            }
                            self.postMessage({ type: 'done', blob: pdf.finish() });
                        } catch(err) {
                            self.postMessage({ type: 'error', error: err.message });
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'text/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                const worker = new Worker(workerUrl);

                worker.onmessage = (e) => {
                    const msg = e.data;
                    if (msg.type === 'progress') {
                        onProgress(msg.current, msg.total, msg.info);
                    } else if (msg.type === 'done') {
                        URL.revokeObjectURL(workerUrl);
                        worker.terminate();
                        resolve(msg.blob);
                    } else if (msg.type === 'error') {
                        URL.revokeObjectURL(workerUrl);
                        worker.terminate();
                        reject(new Error(msg.error));
                    }
                };
                worker.postMessage({ pairs: pairsData, quality });
            });
        }

        _generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        _escapeXml(unsafe) {
            return unsafe.replace(/[<>&'"]/g, c => {
                switch (c) {
                    case '<': return '&lt;'; case '>': return '&gt;';
                    case '&': return '&amp;'; case '\'': return '&apos;'; case '"': return '&quot;';
                }
            });
        }
    }

    // ==========================================
    // 6.5. EPUB生成クラス (商用対応版)
    // ==========================================
    class EpubGenerator {
        constructor(fileSystemManager) {
            this.fs = fileSystemManager;
        }

        // 【追加】画像最適化パイプライン (リサイズ＆JPEG統一)
        async _optimizeImage(file, maxDim = 2400, quality = 0.85) {
            const bitmap = await createImageBitmap(file);
            let w = bitmap.width;
            let h = bitmap.height;
            
            if (w > maxDim || h > maxDim) {
                const scale = Math.min(maxDim / w, maxDim / h);
                w = Math.max(1, Math.floor(w * scale));
                h = Math.max(1, Math.floor(h * scale));
            }
            
            const canvas = new OffscreenCanvas(w, h);
            const ctx = canvas.getContext('2d');
            // 背景を白で塗りつぶす（透過PNG対策）
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(bitmap, 0, 0, w, h);
            bitmap.close();
            
            const blob = await canvas.convertToBlob({ type: 'image/jpeg', quality: quality });
            return { blob, w, h };
        }

        async generate(fileItems, metadata, viewMode, onProgress) {
            let handle = null;
            const suggestedName = (metadata.title || 'book') + '.epub';
            if ('showSaveFilePicker' in window) {
                try {
                    handle = await window.showSaveFilePicker({
                        suggestedName: suggestedName,
                        types:[{ description: 'EPUB File', accept: { 'application/epub+zip':['.epub'] } }],
                        startIn: 'downloads'
                    });
                } catch (e) {
                    if (e.name === 'AbortError') return false; 
                    throw e;
                }
            }

            const zip = new ZipDocument();
            const encoder = new TextEncoder();
            
            zip.addFile('mimetype', encoder.encode('application/epub+zip'));
            
            const containerXml = `<?xml version="1.0" encoding="UTF-8"?>\n<container\n version="1.0"\n xmlns="urn:oasis:names:tc:opendocument:xmlns:container"\n>\n<rootfiles>\n<rootfile\n full-path="item/standard.opf"\n media-type="application/oebps-package+xml"\n/>\n</rootfiles>\n</container>`;
            zip.addFile('META-INF/container.xml', encoder.encode(containerXml));
            
            const cssContent = `@charset "UTF-8";\n\nhtml,\nbody {\n  margin:    0;\n  padding:   0;\n  font-size: 0;\n}\nsvg {\n  margin:    0;\n  padding:   0;\n}`;
            zip.addFile('item/style/fixed-layout-jp.css', encoder.encode(cssContent));

            let navList = '';
            let navPoints = ''; // 【追加】NCX用目次
            let playOrder = 1;  // 【追加】NCX用順序
            
            let manifestImage = '';
            let manifestXhtml = '';
            let spineStr = '';
            
            const padLength = Math.max(3, String(fileItems.length).length);
            
            const title = this.fs._escapeXml(metadata.title || 'Untitled');
            const titleRuby = this.fs._escapeXml(metadata.titleRuby || metadata.title || 'Untitled');
            const author = this.fs._escapeXml(metadata.author || '');
            const authorRuby = this.fs._escapeXml(metadata.authorRuby || metadata.author || '');
            const publisher = this.fs._escapeXml(metadata.publisher || '');
            const publisherRuby = this.fs._escapeXml(metadata.publisherRuby || metadata.publisher || '');
            const bookId = this.fs._escapeXml(metadata.bookId || 'urn:uuid:' + this.fs._generateUUID());
            
            let modifiedDate = metadata.modified ? metadata.modified + 'T00:00:00Z' : new Date().toISOString().split('.')[0] + 'Z';

            let coverW = 0, coverH = 0; // Kindle用メタデータで使用するカバー解像度

            for (let i = 0; i < fileItems.length; i++) {
                const item = fileItems[i];
                const file = await item.handle.getFile();
                
                // 【修正】画像最適化パイプラインを通す (長辺2400px, JPEG 85%)
                const optimized = await this._optimizeImage(file, 2400, 0.85);
                const w = optimized.w;
                const h = optimized.h;
                const imgBlob = optimized.blob;
                
                const mime = 'image/jpeg';
                const ext = 'jpg';
                
                const index = i + 1;
                const isCover = (index === 1);
                // カバー画像の寸法を記録（Kindle用 original-resolution に使用）
                if (isCover) { coverW = w; coverH = h; }
                const numStr = String(index).padStart(padLength, '0');
                
                const imgId = isCover ? 'cover' : `i-${numStr}`;
                const imgName = isCover ? `cover.${ext}` : `i-${numStr}.${ext}`;
                const xhtmlId = isCover ? 'p-cover' : `p-${numStr}`;
                const xhtmlName = isCover ? 'p-cover.xhtml' : `p-${numStr}.xhtml`;
                
                // preserveAspectRatio を削除
                const xhtml = `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE html>\n<html\n xmlns="http://www.w3.org/1999/xhtml"\n xmlns:epub="http://www.idpf.org/2007/ops"\n xml:lang="ja"\n>\n<head>\n<meta charset="UTF-8"/>\n<title>${title}</title>\n<link rel="stylesheet" type="text/css" href="../style/fixed-layout-jp.css"/>\n<meta name="viewport" content="width=${w}, height=${h}"/>\n</head>\n<body>\n<div class="main">\n\n<svg xmlns="http://www.w3.org/2000/svg" version="1.1"\n xmlns:xlink="http://www.w3.org/1999/xlink"\n width="100%" height="100%" viewBox="0 0 ${w} ${h}">\n<image width="${w}" height="${h}" xlink:href="../image/${imgName}"/>\n</svg>\n\n</div>\n</body>\n</html>`;

                await zip.addFileAsync(`item/image/${imgName}`, imgBlob);
                zip.addFile(`item/xhtml/${xhtmlName}`, encoder.encode(xhtml));
                
                manifestImage += `<item media-type="${mime}" id="${imgId}" href="image/${imgName}"${isCover ? ' properties="cover-image"' : ''}/>\n`;
                // fallback属性を追加
                manifestXhtml += `<item media-type="application/xhtml+xml" id="${xhtmlId}" href="xhtml/${xhtmlName}" properties="svg" fallback="${imgId}"/>\n`;
                
                // 【修正】目次（TOC）の構築（表紙 または ユーザーが設定した目次名）
                if (isCover || item.tocName) {
                    // 表紙の場合は作品名を、それ以外は設定された目次名を使用
                    const tocLabel = isCover ? title : this.fs._escapeXml(item.tocName);
                    const navId = isCover ? 'cover' : `navPoint-${playOrder}`;
                    
                    navList += `<li><a href="xhtml/${xhtmlName}">${tocLabel}</a></li>\n`;
                    navPoints += `<navPoint id="${navId}" playOrder="${playOrder}">\n<navLabel>\n<text>${tocLabel}</text>\n</navLabel>\n<content src="xhtml/${xhtmlName}"/>\n</navPoint>\n`;
                    playOrder++;
                }
                
                let spreadProp = '';
                if (viewMode === 'spread-rtl') {
                    if (isCover) spreadProp = ' properties="rendition:page-spread-center"';
                    else spreadProp = (index % 2 === 0) ? ' properties="page-spread-right"' : ' properties="page-spread-left"';
                } else if (viewMode === 'spread-ltr') {
                    if (isCover) spreadProp = ' properties="rendition:page-spread-center"';
                    else spreadProp = (index % 2 === 0) ? ' properties="page-spread-left"' : ' properties="page-spread-right"';
                }
                spineStr += `<itemref linear="yes" idref="${xhtmlId}"${spreadProp}/>\n`;
                
                onProgress(index, fileItems.length, item.name);
                if (i % 5 === 0) await new Promise(resolve => setTimeout(resolve, 0));
            }

            // XHTMLナビゲーション文書
            const navXml = `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE html>\n<html\n xmlns="http://www.w3.org/1999/xhtml"\n xmlns:epub="http://www.idpf.org/2007/ops"\n xml:lang="ja"\n>\n<head>\n<meta charset="UTF-8"/>\n<title>${title}</title>\n</head>\n<body>\n<nav epub:type="toc" id="toc">\n<h1>${title}</h1>\n<ol>\n${navList}</ol>\n</nav>\n</body>\n</html>`;
            zip.addFile('item/navigation-documents.xhtml', encoder.encode(navXml));

            // 【追加】NCXファイルの生成 (EpubCheck / 古いリーダー対応) dtb:depthを0に変更
            const ncxXml = `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
<head>
<meta name="dtb:uid" content="${bookId}"/>
<meta name="dtb:depth" content="0"/>
<meta name="dtb:totalPageCount" content="0"/>
<meta name="dtb:maxPageNumber" content="0"/>
</head>
<docTitle>
<text>${title}</text>
</docTitle>
<navMap>

${navPoints}</navMap>

</ncx>`;
            zip.addFile('item/toc.ncx', encoder.encode(ncxXml));

            let direction = 'default';
            if (viewMode === 'spread-rtl') direction = 'rtl';
            else if (viewMode === 'spread-ltr') direction = 'ltr';

            // 【修正】OPFにNCXを登録、Kindle用メタデータ追加、属性順変更
            const opf = `<?xml version="1.0" encoding="UTF-8"?>
<package
 xmlns="http://www.idpf.org/2007/opf"
 version="3.0"
 xml:lang="ja"
 unique-identifier="unique-id"
 prefix="rendition: http://www.idpf.org/vocab/rendition/#
         ebpaj: http://www.ebpaj.jp/"
>

<metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms">

<!-- 作品名 -->
<dc:title id="title">${title}</dc:title>
<meta refines="#title" property="file-as">${titleRuby}</meta>

<!-- 著者名 -->
<dc:creator id="author">${author}</dc:creator>
<meta refines="#author" property="role" scheme="marc:relators">aut</meta>
<meta refines="#author" property="file-as">${authorRuby}</meta>

<!-- 出版社名 -->
<dc:publisher id="publisher">${publisher}</dc:publisher>
<meta refines="#publisher" property="file-as">${publisherRuby}</meta>

<!-- 言語 -->
<dc:language>ja</dc:language>

<!-- ファイルid -->
<dc:identifier id="unique-id">${bookId}</dc:identifier>

<!-- 更新日 -->
<meta property="dcterms:modified">${modifiedDate}</meta>

<!-- Fixed-Layout Documents指定 -->
<meta property="rendition:layout">pre-paginated</meta>
<meta property="rendition:spread">landscape</meta>

<!-- etc. -->
<meta property="ebpaj:guide-version">1.1.3</meta>
<dc:contributor id="encoder">Image-sorting WebApp</dc:contributor>
<meta refines="#encoder" property="role" scheme="marc:relators">mrk</meta>

<!-- kindle用 -->
<meta name="original-resolution" content="${coverW}x${coverH}"/>
<meta name="RegionMagnification" content="true"/>

</metadata>

<manifest>

<!-- navigation -->
<item media-type="application/xhtml+xml" id="toc" href="navigation-documents.xhtml" properties="nav"/>
<item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>

<!-- style -->
<item media-type="text/css" id="fixed-layout-jp" href="style/fixed-layout-jp.css"/>

<!-- image -->
${manifestImage}
<!-- xhtml -->
${manifestXhtml}</manifest>

<spine toc="ncx" page-progression-direction="${direction}">
${spineStr}</spine>

</package>`;

            zip.addFile('item/standard.opf', encoder.encode(opf));

            const blob = zip.finish();

            if (handle) {
                const writable = await handle.createWritable();
                await writable.write(blob);
                await writable.close();
            } else {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = suggestedName;
                a.click();
                setTimeout(() => URL.revokeObjectURL(a.href), 1000);
            }
            return true;
        }
    }

    // ==========================================
    // 7. アプリケーションのメインコントローラー
    // ==========================================
    class App {
        constructor() {
            this.ui = new UIManager(
                (id) => this.getImageUrl(id),
                (id) => this.releaseImageUrl(id)
            );
            this.fs = new FileSystemManager();
            this.epubGen = new EpubGenerator(this.fs);
            this.sortManager = new SortManager(
                this.ui, 
                (draggedIds, targetId, isLogicalBefore) => this.reorderFiles(draggedIds, targetId, isLogicalBefore),
                (itemsOrFiles, targetId, isLogicalBefore) => this.handleExternalDropToItem(itemsOrFiles, targetId, isLogicalBefore)
            );
            this.epubModal = new EpubMetadataModal();
            
            this.dirHandle = null;
            this.fileItems =[];
            this.isProcessing = false;
            this.historyUndo =[];
            this.historyRedo =[];
            this.dragCounter = 0;

            this.hasFSApi = 'showDirectoryPicker' in window;
            if (!this.hasFSApi) {
                console.warn(USER_SETTINGS.msgFallbackLoad);
            }
            
            this.ui.changeViewMode('spread-rtl');
            this.bindEvents();
        }

        setProcessingState(isProcessing) {
            this.isProcessing = isProcessing;
            this.ui.setButtonsState(isProcessing, this.fileItems.length > 0);
            if (!isProcessing) {
                this.updateHistoryButtons();
            }
        }

        hideDropOverlay() {
            this.dragCounter = 0;
            const overlay = document.getElementById('drop-overlay');
            if (overlay) overlay.style.display = 'none';
        }

        async getImageUrl(id) {
            const item = this.fileItems.find(i => i.id === id);
            if (!item) return null;
            if (item.objectUrl) return item.objectUrl; 
            
            const file = await item.handle.getFile();
            item.objectUrl = URL.createObjectURL(file);
            return item.objectUrl;
        }

        releaseImageUrl(id) {
            const item = this.fileItems.find(i => i.id === id);
            if (item && item.objectUrl) {
                URL.revokeObjectURL(item.objectUrl);
                item.objectUrl = null;
            }
        }

        bindEvents() {
            this.ui.btnSelect.addEventListener('click', () => this.handleSelectFolder());
            this.ui.btnExecute.addEventListener('click', () => this.handleExecute());
            this.ui.btnUndo.addEventListener('click', () => this.undo());
            this.ui.btnRedo.addEventListener('click', () => this.redo());
            this.ui.btnReset.addEventListener('click', () => this.reset());
            this.ui.btnSetToc.addEventListener('click', () => this.handleSetToc()); // 追加
            this.ui.btnAddBlank.addEventListener('click', () => this.handleAddBlank());
            this.ui.btnDelete.addEventListener('click', () => this.handleDelete());

            window.addEventListener('beforeunload', (e) => {
                // 処理中 または 編集中のファイルが存在する場合に確認ダイアログを表示
                if (this.isProcessing || this.fileItems.length > 0) {
                    e.preventDefault();
                    // returnValue に文字列をセットすることでブラウザ標準の確認ダイアログが出る
                    e.returnValue = '編集中のデータがあります。ページを離れると変更が失われます。';
                }
            });

            document.addEventListener('keydown', (e) => {
                if (this.isProcessing) return;
                
                if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) return;

                const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                const cmdOrCtrl = isMac ? e.metaKey : e.ctrlKey;
                
                if (cmdOrCtrl && e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    if (e.shiftKey) this.redo();
                    else this.undo();
                } else if (cmdOrCtrl && e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    this.redo();
                } else if (e.key === 'Delete' || e.key === 'Backspace') {
                    e.preventDefault();
                    this.handleDelete();
                }
            });

            const overlay = document.getElementById('drop-overlay');

            document.body.addEventListener('dragenter', (e) => {
                e.preventDefault();
                if (e.dataTransfer.types && (e.dataTransfer.types.includes('Files') || e.dataTransfer.types.includes('application/x-moz-file'))) {
                    this.dragCounter++;
                    overlay.style.display = 'flex';
                }
            });
            document.body.addEventListener('dragover', (e) => e.preventDefault());
            document.body.addEventListener('dragleave', (e) => {
                e.preventDefault();
                if (e.dataTransfer.types && (e.dataTransfer.types.includes('Files') || e.dataTransfer.types.includes('application/x-moz-file'))) {
                    this.dragCounter--;
                    if (this.dragCounter <= 0) {
                        this.hideDropOverlay();
                    }
                }
            });
            document.body.addEventListener('drop', async (e) => {
                e.preventDefault();
                this.hideDropOverlay();
                
                if (!e.dataTransfer.types || (!e.dataTransfer.types.includes('Files') && !e.dataTransfer.types.includes('application/x-moz-file'))) return;
                if (this.isProcessing) return;

                const items = e.dataTransfer.items;
                let droppedDirHandle = null;
                const fileHandles = [];
                const filesFallback = [];
                let hasDirectory = false;

                if (this.hasFSApi && items) {
                    const handlePromises = [];
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        if (item.kind === 'file' && typeof item.getAsFileSystemHandle === 'function') {
                            handlePromises.push(item.getAsFileSystemHandle());
                        }
                    }
                    
                    const handles = await Promise.all(handlePromises);
                    for (const handle of handles) {
                        if (handle) {
                            if (handle.kind === 'directory') {
                                hasDirectory = true;
                                droppedDirHandle = handle;
                                break;
                            } else if (handle.kind === 'file') {
                                fileHandles.push(handle);
                            }
                        }
                    }
                } else {
                    const files = Array.from(e.dataTransfer.files);
                    for (let f of files) {
                        if (!f.name) continue;
                        const ext = f.name.split('.').pop().toLowerCase();
                        if (USER_SETTINGS.validExts.includes(ext)) {
                            filesFallback.push(f);
                        } else if (!f.type) {
                            hasDirectory = true; 
                        }
                    }
                }

                if (hasDirectory && droppedDirHandle) {
                    this.handleLoadDirectory(droppedDirHandle);
                } else if (hasDirectory && !this.hasFSApi) {
                    this.resetMemory();
                    this.fileItems = await this.fs.loadImagesFallback(e.dataTransfer.files);
                    this.finalizeLoad();
                } else {
                    const targetFiles = this.hasFSApi ? fileHandles : filesFallback;
                    if (targetFiles.length > 0) {
                        const isHandles = this.hasFSApi && fileHandles.length > 0;
                        await this.handleAddFilesToTail(targetFiles, isHandles);
                    }
                }
            });
        }

        saveHistory() {
            this.historyUndo.push(this.fileItems.map(item => ({...item})));
            this.historyRedo =[];
            this.updateHistoryButtons();
        }

        undo() {
            if (this.historyUndo.length === 0 || this.isProcessing) return;
            this.historyRedo.push(this.fileItems.map(item => ({...item})));
            this.fileItems = this.historyUndo.pop();
            this.ui.renderItems(this.fileItems);
            this.sortManager.init();
            this.updateHistoryButtons();
            this.ui.setButtonsState(false, this.fileItems.length > 0);
        }

        redo() {
            if (this.historyRedo.length === 0 || this.isProcessing) return;
            this.historyUndo.push(this.fileItems.map(item => ({...item})));
            this.fileItems = this.historyRedo.pop();
            this.ui.renderItems(this.fileItems);
            this.sortManager.init();
            this.updateHistoryButtons();
            this.ui.setButtonsState(false, this.fileItems.length > 0);
        }

        updateHistoryButtons() {
            this.ui.btnUndo.disabled = this.historyUndo.length === 0 || this.isProcessing;
            this.ui.btnRedo.disabled = this.historyRedo.length === 0 || this.isProcessing;
        }

        async handleSelectFolder() {
            try {
                if (this.hasFSApi) {
                    const handle = await this.fs.selectDirectory();
                    await this.handleLoadDirectory(handle);
                } else {
                    const files = await this.fs.selectDirectoryFallback();
                    this.resetMemory();
                    this.fileItems = await this.fs.loadImagesFallback(files);
                    this.finalizeLoad();
                }
            } catch (e) {
                if (e.name !== 'AbortError') console.error(e);
            }
        }

        async handleLoadDirectory(dirHandle) {
            this.dirHandle = dirHandle;
            try {
                this.resetMemory();
                this.fileItems = await this.fs.loadImages(this.dirHandle);
                this.finalizeLoad();
            } catch (e) {
                console.error(e);
                this.ui.showToast('❌ エラーが発生しました: ' + e.message, true);
            }
        }

        finalizeLoad() {
            if (this.fileItems.length === 0) {
                this.ui.showToast('❌ 画像が見つかりませんでした。', true);
                return;
            }
            this.ui.renderItems(this.fileItems);
            this.sortManager.init();
            this.historyUndo =[];
            this.historyRedo =[];
            this.updateHistoryButtons();
            this.ui.setButtonsState(false, true);
        }

        reorderFiles(draggedIds, targetId, isLogicalBefore) {
            this.hideDropOverlay();
            this.saveHistory();
            
            const draggedItems = this.fileItems.filter(item => draggedIds.includes(item.id));
            let newItems = this.fileItems.filter(item => !draggedIds.includes(item.id));
            
            let targetIndex = newItems.findIndex(item => item.id === targetId);
            if (targetIndex === -1) targetIndex = newItems.length;
            
            const insertIndex = isLogicalBefore ? targetIndex : targetIndex + 1;
            newItems.splice(insertIndex, 0, ...draggedItems);
            
            this.fileItems = newItems;
            
            this.ui.renderItems(this.fileItems);
            this.sortManager.init();
            
            draggedIds.forEach(id => this.sortManager.selectById(id, true));
            this.sortManager.lastSelectedId = draggedIds[draggedIds.length - 1];
        }

        // 【追加】目次設定ハンドラ
        handleSetToc() {
            const selectedEls = Array.from(document.querySelectorAll('.thumb-item.selected'));
            if (selectedEls.length === 0) {
                this.ui.showToast('目次を設定する画像を選択してください。', true);
                return;
            }

            const firstId = selectedEls[0].dataset.id;
            const firstItem = this.fileItems.find(item => item.id === firstId);
            const currentToc = firstItem ? (firstItem.tocName || '') : '';

            const newToc = prompt('目次名（チャプター名）を入力してください。\n空欄にすると目次設定を解除します。', currentToc);
            if (newToc === null) return; // キャンセル

            this.saveHistory();
            
            selectedEls.forEach(el => {
                const id = el.dataset.id;
                const item = this.fileItems.find(i => i.id === id);
                if (item) {
                    item.tocName = newToc.trim() === '' ? null : newToc.trim();
                }
            });

            this.ui.renderItems(this.fileItems);
            this.sortManager.init();
            
            // 選択状態を復元
            selectedEls.forEach(el => this.sortManager.selectById(el.dataset.id, true));
        }

        async handleAddBlank() {
            const selectedEls = Array.from(document.querySelectorAll('.thumb-item.selected'));
            if (selectedEls.length === 0) {
                this.ui.showToast('白紙を挿入する基準となる画像を選択してください。', true);
                return;
            }

            this.setProcessingState(true);
            
            try {
                this.saveHistory();
                
                for (let i = selectedEls.length - 1; i >= 0; i--) {
                    const id = selectedEls[i].dataset.id;
                    const index = this.fileItems.findIndex(item => item.id === id);
                    if (index === -1) continue;

                    const baseItem = this.fileItems[index];
                    const file = await baseItem.handle.getFile();
                    const bmp = await createImageBitmap(file);
                    const w = bmp.width;
                    const h = bmp.height;
                    bmp.close();

                    const canvas = new OffscreenCanvas(w, h);
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                    const blob = await canvas.convertToBlob({ type: 'image/jpeg', quality: 0.9 });
                    
                    const newId = `blank_${Date.now()}_${Math.random().toString(36).substring(2,9)}`;
                    const newName = `blank_${w}x${h}.jpg`;
                    const dummyFile = new File([blob], newName, { type: 'image/jpeg' });
                    
                    const newItem = {
                        id: newId,
                        name: newName,
                        handle: { getFile: async () => dummyFile },
                        objectUrl: URL.createObjectURL(dummyFile),
                        tocName: null
                    };
                    
                    this.fileItems.splice(index + 1, 0, newItem);
                }
                
                this.ui.renderItems(this.fileItems);
                this.sortManager.init();
            } catch (e) {
                console.error(e);
                this.ui.showToast('白紙の挿入に失敗しました。', true);
            } finally {
                this.setProcessingState(false);
            }
        }

        handleDelete() {
            const selectedEls = Array.from(document.querySelectorAll('.thumb-item.selected'));
            if (selectedEls.length === 0) return;

            this.saveHistory();
            const idsToRemove = selectedEls.map(el => el.dataset.id);
            
            this.fileItems = this.fileItems.filter(item => !idsToRemove.includes(item.id));
            
            this.ui.renderItems(this.fileItems);
            this.sortManager.init();
            
            this.ui.setButtonsState(false, this.fileItems.length > 0);
        }

        async handleExternalDropToItem(itemsOrFiles, targetId, isLogicalBefore) {
            this.hideDropOverlay();
            if (this.isProcessing) return;
            this.setProcessingState(true);

            try {
                const newItems = [];
                
                if (this.hasFSApi && itemsOrFiles.length > 0 && typeof itemsOrFiles[0].getAsFileSystemHandle === 'function') {
                    const handlePromises = [];
                    for (let i = 0; i < itemsOrFiles.length; i++) {
                        const item = itemsOrFiles[i];
                        if (item.kind === 'file') {
                            handlePromises.push(item.getAsFileSystemHandle());
                        }
                    }
                    
                    const handles = await Promise.all(handlePromises);
                    for (const handle of handles) {
                        if (handle && handle.kind === 'file') {
                            const ext = handle.name.split('.').pop().toLowerCase();
                            if (USER_SETTINGS.validExts.includes(ext)) {
                                newItems.push({ handle, name: handle.name });
                            }
                        }
                    }
                } else {
                    const files = itemsOrFiles instanceof FileList ? Array.from(itemsOrFiles) : Array.from(itemsOrFiles).map(i => i.getAsFile && i.getAsFile() || i);
                    for (let f of files) {
                        if (!f || !f.name) continue;
                        const ext = f.name.split('.').pop().toLowerCase();
                        if (USER_SETTINGS.validExts.includes(ext)) {
                            newItems.push({ handle: { getFile: async () => f }, name: f.name });
                        }
                    }
                }

                if (newItems.length > 0) {
                    if (this.fileItems.length > 0) this.saveHistory();
                    
                    const addedItems = newItems.map(ni => {
                        return {
                            id: `added_${Date.now()}_${Math.random().toString(36).substring(2,9)}_${ni.name}`,
                            name: ni.name,
                            handle: ni.handle,
                            objectUrl: null,
                            tocName: null
                        };
                    });

                    let targetIndex = this.fileItems.findIndex(item => item.id === targetId);
                    if (targetIndex === -1) targetIndex = this.fileItems.length;
                    const insertIndex = isLogicalBefore ? targetIndex : targetIndex + 1;
                    
                    this.fileItems.splice(insertIndex, 0, ...addedItems);
                    
                    this.ui.renderItems(this.fileItems);
                    this.sortManager.init();
                }
            } catch (e) {
                console.error(e);
                this.ui.showToast('画像の追加に失敗しました。', true);
            } finally {
                this.setProcessingState(false);
            }
        }

        async handleAddFilesToTail(filesOrHandles, isHandles) {
            this.setProcessingState(true);
            
            try {
                if (this.fileItems.length > 0) this.saveHistory();
                
                const newItems = [];
                for (let i = 0; i < filesOrHandles.length; i++) {
                    const f = filesOrHandles[i];
                    const name = isHandles ? f.name : f.name;
                    const ext = name.split('.').pop().toLowerCase();
                    
                    if (USER_SETTINGS.validExts.includes(ext)) {
                        const id = `added_${Date.now()}_${Math.random().toString(36).substring(2,9)}_${name}`;
                        newItems.push({
                            id: id,
                            name: name,
                            handle: isHandles ? f : { getFile: async () => f },
                            objectUrl: null,
                            tocName: null
                        });
                    }
                }
                
                if (newItems.length > 0) {
                    this.fileItems.push(...newItems);
                    this.ui.renderItems(this.fileItems);
                    this.sortManager.init();
                }
            } catch (e) {
                console.error(e);
                this.ui.showToast('画像の追加に失敗しました。', true);
            } finally {
                this.setProcessingState(false);
            }
        }

        getGridLayoutData() {
            const gridRect = this.ui.mainGrid.getBoundingClientRect();
            const items =[];
            const thumbEls = this.ui.mainGrid.querySelectorAll('.thumb-item');
            const viewMode = this.ui.viewModeSelect.value;
            
            let maxX = 0;
            let maxY = 0;

            thumbEls.forEach((el, index) => {
                const id = el.dataset.id;
                const fileItem = this.fileItems.find(i => i.id === id);
                if (!fileItem) return;

                const img = el.querySelector('img');
                if (!img) return;
                const rect = img.getBoundingClientRect();
                
                const x = rect.left - gridRect.left + this.ui.mainGrid.scrollLeft;
                const y = rect.top - gridRect.top + this.ui.mainGrid.scrollTop;
                const w = rect.width;
                const h = rect.height;

                let alignX = 'center';
                if (viewMode === 'spread-ltr') {
                    if (index > 0) alignX = (index % 2 === 1) ? 'right' : 'left';
                } else if (viewMode === 'spread-rtl') {
                    if (index > 0) alignX = (index % 2 === 1) ? 'left' : 'right';
                }

                items.push({ fileItem, x, y, w, h, alignX, index });

                if (x + w > maxX) maxX = x + w;
                if (y + h + 20 > maxY) maxY = y + h + 20; 
            });

            const padding = 20;
            return {
                items,
                totalWidth: maxX + padding,
                totalHeight: maxY + padding
            };
        }

        getSpreadPairs() {
            const viewMode = this.ui.viewModeSelect.value;
            const pairs =[];
            if (viewMode === 'grid') {
                this.fileItems.forEach(item => pairs.push([item]));
                return pairs;
            }
            
            if (this.fileItems.length > 0) {
                pairs.push([this.fileItems[0]]);
            }
            
            for (let i = 1; i < this.fileItems.length; i += 2) {
                const item1 = this.fileItems[i];
                const item2 = this.fileItems[i + 1];
                
                if (!item2) {
                    pairs.push([item1]);
                } else {
                    if (viewMode === 'spread-rtl') {
                        pairs.push([item2, item1]);
                    } else {
                        pairs.push([item1, item2]);
                    }
                }
            }
            return pairs;
        }

        async handleExecute() {
            if (this.fileItems.length === 0) return;

            const saveFormat = this.ui.saveFormatSelect.value;
            
            if (saveFormat === 'epub') {
                let metadata;
                try {
                    metadata = await this.epubModal.show();
                } catch (e) {
                    return; 
                }
                this.setProcessingState(true);
                
                try {
                    const success = await this.epubGen.generate(this.fileItems, metadata, this.ui.viewModeSelect.value, (current, total, info) => {
                        const percent = (current / total) * 100;
                        const text = USER_SETTINGS.msgSavingEpub.replace('{current}', current).replace('{total}', total) + ` (${info})`;
                        this.ui.updateProgress(percent, text);
                    });
                    if (success) this.ui.showToast(`EPUBを保存しました。`);
                } catch (e) {
                    console.error(e);
                    if (e.name !== 'AbortError') this.ui.showToast('保存中にエラーが発生しました: ' + e.message, true);
                } finally {
                    this.setProcessingState(false);
                    setTimeout(() => this.ui.updateProgress(0, ''), 3000);
                    if (window.gc) { try { window.gc(); } catch (e) {} }
                }
                return;
            }

            this.setProcessingState(true);

            try {
                if (saveFormat === 'rename') {
                    if (this.hasFSApi) {
                        let targetDirHandle;
                        try {
                            targetDirHandle = await window.showDirectoryPicker({ 
                                mode: 'readwrite', 
                                id: 'save-folder',
                                startIn: 'downloads'
                            });
                        } catch (e) {
                            if (e.name === 'AbortError') return; 
                            throw new Error('フォルダ選択がキャンセルされたか、ブロックされました。');
                        }
                        await this.fs.saveRenamedFiles(targetDirHandle, this.fileItems, (current, total, newName) => {
                            const percent = (current / total) * 100;
                            const text = USER_SETTINGS.msgSaving.replace('{current}', current).replace('{total}', total) + ` (${newName})`;
                            this.ui.updateProgress(percent, text);
                        });
                        this.ui.showToast(`選択したフォルダ内に画像を保存しました。`);
                    } else {
                        await this.fs.saveRenamedFilesFallback(this.fileItems, (current, total, newName) => {
                            const percent = (current / total) * 100;
                            const text = USER_SETTINGS.msgSaving.replace('{current}', current).replace('{total}', total) + ` (${newName})`;
                            this.ui.updateProgress(percent, text);
                        });
                        this.ui.showToast(`ZIPファイルのダウンロードが完了しました。`);
                    }
                } else if (saveFormat === 'merge-rename') {
                    const pairs = this.getSpreadPairs();
                    if (this.hasFSApi) {
                        let targetDirHandle;
                        try {
                            targetDirHandle = await window.showDirectoryPicker({ 
                                mode: 'readwrite', 
                                id: 'save-folder',
                                startIn: 'downloads'
                            });
                        } catch (e) {
                            if (e.name === 'AbortError') return; 
                            throw new Error('フォルダ選択がキャンセルされたか、ブロックされました。');
                        }
                        await this.fs.saveMergedRenamedFiles(targetDirHandle, pairs, (current, total, newName) => {
                            const percent = (current / total) * 100;
                            const text = USER_SETTINGS.msgSaving.replace('{current}', current).replace('{total}', total) + ` (${newName})`;
                            this.ui.updateProgress(percent, text);
                        });
                        this.ui.showToast(`選択したフォルダ内に結合画像を保存しました。`);
                    } else {
                        await this.fs.saveMergedRenamedFilesFallback(pairs, (current, total, newName) => {
                            const percent = (current / total) * 100;
                            const text = USER_SETTINGS.msgSaving.replace('{current}', current).replace('{total}', total) + ` (${newName})`;
                            this.ui.updateProgress(percent, text);
                        });
                        this.ui.showToast(`ZIPファイルのダウンロードが完了しました。`);
                    }
                } else if (saveFormat === 'pdf' || saveFormat === 'pdf-sheet' || saveFormat === 'merge-pdf') {
                    const quality = parseInt(this.ui.pdfQuality.value, 10) || 30;
                    let success = false;
                    
                    if (saveFormat === 'pdf') {
                        success = await this.fs.saveAsPDF(this.fileItems, quality, (current, total, info) => {
                            const percent = (current / total) * 100;
                            const text = USER_SETTINGS.msgSavingPDF.replace('{current}', current).replace('{total}', total) + ` (${info})`;
                            this.ui.updateProgress(percent, text);
                        });
                    } else if (saveFormat === 'pdf-sheet') {
                        const layoutData = this.getGridLayoutData();
                        success = await this.fs.saveAsThumbnailPDF(layoutData, quality, (current, total, info) => {
                            const percent = (current / total) * 100;
                            const text = USER_SETTINGS.msgSavingPDF.replace('{current}', current).replace('{total}', total) + ` (${info})`;
                            this.ui.updateProgress(percent, text);
                        });
                    } else if (saveFormat === 'merge-pdf') {
                        const pairs = this.getSpreadPairs();
                        success = await this.fs.saveMergedAsPDF(pairs, quality, (current, total, info) => {
                            const percent = (current / total) * 100;
                            const text = USER_SETTINGS.msgSavingPDF.replace('{current}', current).replace('{total}', total) + ` (${info})`;
                            this.ui.updateProgress(percent, text);
                        });
                    }
                    
                    if (success) this.ui.showToast(`PDFを保存しました。`);
                }
            } catch (e) {
                console.error(e);
                if (e.name !== 'AbortError') this.ui.showToast('保存中にエラーが発生しました: ' + e.message, true);
            } finally {
                this.setProcessingState(false);
                setTimeout(() => this.ui.updateProgress(0, ''), 3000);
                if (window.gc) { try { window.gc(); } catch (e) {} }
            }
        }

        resetMemory() {
            const allItems = new Set([
                ...this.fileItems,
                ...this.historyUndo.flat(),
                ...this.historyRedo.flat()
            ]);
            
            allItems.forEach(item => {
                if (item.objectUrl) {
                    URL.revokeObjectURL(item.objectUrl);
                    item.objectUrl = null;
                }
            });
        }

        reset() {
            if (this.isProcessing) return;
            
            this.resetMemory();
            this.fileItems.forEach(item => URL.revokeObjectURL(item.objectUrl));
            this.fileItems = [];
            this.historyUndo = [];
            this.historyRedo = [];
            
            this.ui.clear();
            this.updateHistoryButtons();
            this.sortManager.destroy();
        }
}

new App();

});
</script>
